<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Вино-карточки | Вкус & ассоциации</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* фиксируем высоту ровно на весь экран, запрещаем скролл */
        html, body {
            height: 100%;
            overflow: hidden;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        body {
            background: linear-gradient(145deg, #2b2b26 0%, #1f1e1a 100%);
            font-family: 'Segoe UI', 'Roboto', 'Georgia', 'Times New Roman', serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0.75rem;
            overflow: hidden;
        }

        .carousel-container {
            width: 100%;
            max-width: 550px;
            margin: 0 auto;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            max-height: 100vh;
        }

        .card-wrapper {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1800px;
            margin: 0.5rem 0 0.8rem;
            flex-shrink: 1;
            min-height: 0;
        }

        .flashcard {
            background-color: transparent;
            width: 100%;
            max-width: 380px;
            height: 490px;
            perspective: 1500px;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        @media (max-width: 550px) {
            .flashcard {
                height: 460px;
                max-width: 94vw;
            }
            .card-front h2 {
                font-size: 1.4rem;
            }
            .info-value {
                font-size: 0.95rem;
            }
        }

        @media (max-width: 480px) {
            .flashcard {
                height: 440px;
            }
        }

        /* для очень высоких экранов карточка не растягивается */
        @media (min-height: 800px) {
            .flashcard {
                height: 500px;
            }
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.65s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 32px;
            box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.6);
        }

        .flashcard.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 32px;
            padding: 1.5rem 1.2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background: #fffef7;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .card-front {
            background: linear-gradient(135deg, #fff9ef 0%, #fff2e0 100%);
            color: #3a2c1f;
            border: 1px solid #edd6b0;
            transform: rotateY(0deg);
        }

        .card-front h2 {
            font-size: 1.7rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            word-break: break-word;
            color: #752e1c;
            border-left: 4px solid #b46b3a;
            padding-left: 0.8rem;
            text-align: left;
            width: 100%;
            max-height: 180px;
            overflow-y: auto;
        }

        .wine-icon {
            font-size: 3.5rem;
            margin: 0.2rem 0 0.5rem;
            opacity: 0.85;
        }

        .flip-hint {
            position: absolute;
            bottom: 18px;
            font-size: 0.7rem;
            color: #b6976c;
            background: rgba(0, 0, 0, 0.05);
            padding: 5px 14px;
            border-radius: 40px;
            font-weight: 500;
            backdrop-filter: blur(2px);
        }

        .card-back {
            background: #2c241a;
            background-image: radial-gradient(circle at 10% 20%, rgba(220, 180, 120, 0.12) 2%, transparent 2.5%);
            background-size: 20px 20px;
            color: #f5efdf;
            transform: rotateY(180deg);
            justify-content: space-between;
            align-items: flex-start;
            text-align: left;
            overflow-y: auto;
        }

        .info-block {
            width: 100%;
            margin: 4px 0;
            border-bottom: 1px solid rgba(219, 178, 102, 0.35);
            padding-bottom: 6px;
        }

        .info-label {
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-weight: 300;
            color: #e7c48b;
            margin-bottom: 4px;
        }

        .info-value {
            font-size: 1rem;
            font-weight: 600;
            word-break: break-word;
            color: #fae7b3;
            line-height: 1.3;
        }

        .taste-association {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 5px 8px;
            margin-top: 2px;
            display: inline-block;
            width: auto;
        }

        .color-tag {
            display: inline-block;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            margin-right: 10px;
            vertical-align: middle;
            border: 2px solid #f1e2c0;
            box-shadow: 0 1px 4px black;
        }

        .color-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }

        .footer-card {
            font-size: 0.6rem;
            text-align: center;
            width: 100%;
            margin-top: 8px;
            color: #cbbf9a;
        }

        /* кнопки навигации (стрелки) */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 0.3rem 0 0.5rem;
            width: 100%;
            flex-shrink: 0;
        }

        .nav-btn {
            background: #3d3324;
            border: none;
            font-size: 2.4rem;
            width: 64px;
            height: 64px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #f2e0b0;
            background: #4a3b2a;
            box-shadow: 0 5px 12px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
        }

        .nav-btn:active {
            transform: scale(0.94);
            background: #6b4f32;
        }

        @media (hover: hover) {
            .nav-btn:hover {
                background: #6e543c;
                transform: scale(1.02);
            }
        }

        /* индикатор прогресса и счётчик — фиксированная ширина, чтобы не двигался */
        .progress-indicator {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 380px;
            margin: 0.2rem auto 0;
            background: #26221bb3;
            backdrop-filter: blur(4px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: 500;
            gap: 16px;
            flex-shrink: 0;
            min-width: 260px;
        }

        .counter-badge {
            background: #4a3a28;
            padding: 4px 16px;
            border-radius: 32px;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .position-text {
            font-size: 0.85rem;
            color: #ecdcaa;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            min-width: 0;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: 0.5rem;
            flex-shrink: 0;
        }

        .sec-btn {
            background: #2f2a21;
            border: none;
            padding: 6px 20px;
            border-radius: 40px;
            color: #f0e2c5;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s linear;
            backdrop-filter: blur(4px);
        }

        .sec-btn:active {
            background: #51442e;
            transform: scale(0.96);
        }

        button {
            touch-action: manipulation;
        }

        /* мелкие экраны: уменьшаем отступы и чуть поджимаем */
        @media (max-width: 480px) {
            .nav-btn {
                width: 54px;
                height: 54px;
                font-size: 2rem;
            }
            .card-front h2 {
                font-size: 1.25rem;
            }
            .progress-indicator {
                padding: 6px 16px;
            }
            .counter-badge {
                font-size: 0.75rem;
                padding: 3px 12px;
            }
            .position-text {
                font-size: 0.75rem;
            }
        }

        /* убираем скролл у body, все элементы внутри flex */
        .carousel-container {
            overflow: hidden;
        }

        /* чтобы длинные названия не ломали верстку на лицевой стороне */
        .card-front h2 {
            overflow-y: auto;
            scrollbar-width: thin;
        }
    </style>
</head>
<body>
<div class="carousel-container">
    <div class="card-wrapper">
        <div class="flashcard" id="flashcard">
            <div class="card-inner"></div>
        </div>
    </div>

    <div class="nav-buttons">
        <button class="nav-btn" id="prevBtn">◀</button>
        <button class="nav-btn" id="nextBtn">▶</button>
    </div>

    <div class="progress-indicator">
        <span class="counter-badge" id="currentIdxDisplay">1 / 28</span>
        <span class="position-text" id="wineNameIndicator">🍇 нажми на карточку</span>
    </div>
    <div class="action-buttons">
        <button class="sec-btn" id="shuffleBtn">🎲 Перемешать</button>
        <button class="sec-btn" id="resetFlipBtn">🔄 Сбросить поворот</button>
    </div>
    <p style="font-size: 0.65rem; margin-top: 0.5rem; color: #b7aa86; text-align: center; flex-shrink: 0;">👇 нажми на карточку — переверни 👆<br>стрелки / свайп для навигации</p>
</div>

<script>
    // ---------- 28 вин с обновлённой информацией + яркая ассоциация вкуса + уникальный смайлик ----------
    const wineCatalog = 
    [
        { name: "Аньядос де Оро Темпранильо", sugar: "Сухое", grape: "Темпранильо", country: "Испания", color: "Красное", taste: "Сушёный инжир и табак", tasteEmoji: "🍂" },
        { name: "Санта Каролина Карменер", sugar: "Полусухое", grape: "Карменер", country: "Чили", color: "Красное", taste: "Слива и кофе", tasteEmoji: "☕" },
        { name: "Стейквайн", sugar: "Сухое", grape: "Каберне Совиньон", country: "Аргентина", color: "Красное", taste: "Тёмные ягоды, пряности и цветы", tasteEmoji: "🫐" },
        { name: "Стрис Оф Итали Монтепульчано", sugar: "Сухое", grape: "Монтепульчано", country: "Италия", color: "Красное", taste: "Тёмные ягоды и слива", tasteEmoji: "🍒" },
        { name: "Реал Форте", sugar: "Сухое", grape: "Арагонеш", country: "Португалия", color: "Красное", taste: "Сушёный инжир и табак", tasteEmoji: "🍂" },
        { name: "Сторис Оф Итали Негромаро", sugar: "Полусладкое", grape: "Негромаро", country: "Италия", color: "Красное", taste: "Черешня и сушёные травы", tasteEmoji: "🍒" },
        { name: "Кинзмараули", sugar: "Полусладкое", grape: "Саперави", country: "Грузия", color: "Красное", taste: "Гранат и вишня", tasteEmoji: "🍒" },
        { name: "Марани телавури (Красное, п/сл)", sugar: "Полусладкое", grape: "Саперави, Каберне Совиньон", country: "Грузия", color: "Красное", taste: "Смородина, красные ягоды", tasteEmoji: "🍓" },
        { name: "Марани телавури (Красное, п/сух)", sugar: "Полусухое", grape: "Саперави", country: "Грузия", color: "Красное", taste: "Гранат и вишня", tasteEmoji: "🍒" },
        { name: "Аве Саперави Кверви", sugar: "Сухое", grape: "Саперави", country: "Грузия", color: "Красное", taste: "Гранат и вишня", tasteEmoji: "🍒" },
        { name: "Перли Бей", sugar: "Сухое", grape: "Сенсо", country: "ЮАР", color: "Красное", taste: "Тёмные ягоды и лакрица", tasteEmoji: "🫐" },
        { name: "Мальборо Спрингс Совиньон Блан", sugar: "Сухое", grape: "Совиньон Блан", country: "Новая Зеландия", color: "Белое", taste: "Крыжовник и дыня", tasteEmoji: "🍈" },
        { name: "Санта Каролина Совиньон Блан", sugar: "Сухое", grape: "Совиньон Блан", country: "Чили", color: "Белое", taste: "Крыжовник и дыня", tasteEmoji: "🍈" },
        { name: "Реал Форте", sugar: "Сухое", grape: "Аринту", country: "Португалия", color: "Белое", taste: "Яблоко и ананас", tasteEmoji: "🍎" },
        { name: "Сториз Оф Итали Треббьяно Шардоне", sugar: "Сухое", grape: "Треббьяно", country: "Италия", color: "Белое", taste: "Яблоко и абрикос", tasteEmoji: "🍎" },
        { name: "Сторис Оф Итали Мальвазия", sugar: "Полусладкое", grape: "Мальвазия", country: "Италия", color: "Белое", taste: "Цитрус и курага", tasteEmoji: "🍊" },
        { name: "Чело Пино Гриджо", sugar: "Полусухое", grape: "Пино гриджо", country: "Италия", color: "Белое", taste: "Лимон и дыня", tasteEmoji: "🍋" },
        { name: "Аньядос Де Оро Айрен", sugar: "Сухое", grape: "Айрен", country: "Испания", color: "Белое", taste: "Белые цветы и персик", tasteEmoji: "🌸" },
        { name: "Перли Бей", sugar: "Сухое", grape: "Шенен Блан", country: "ЮАР", color: "Белое", taste: "Яблоко и имбирь", tasteEmoji: "🍎" },
        { name: "Марани Телавури (Белое, п/сл)", sugar: "Полусладкое", grape: "Ркацетели", country: "Грузия", color: "Белое", taste: "Лимон и зелёный перец", tasteEmoji: "🍋" },
        { name: "Марани Телавури(Белое, сух)", sugar: "Сухое", grape: "Ркацетели", country: "Грузия", color: "Белое", taste: "Лимон и зелёный перец", tasteEmoji: "🍋" },
        { name: "Винья Албали Гарнача (безалкогольное)", sugar: "Безалкогольное", grape: "Гарнача", country: "Испания", color: "Безалкогольное розовое", taste: "Лакрица и слива", tasteEmoji: "🍑" },
        { name: "Винья Албали Каберне Совиньон Темпранильо (безалкогольное)", sugar: "Безалкогольное", grape: "Каберне Совиньон", country: "Испания", color: "Безалкогольное красное", taste: "Красный перец и чёрная смородина", tasteEmoji: "🌶️" },
        { name: "Маркиз Ди Альтилло Розе", sugar: "Сухое", grape: "Гарнача", country: "Испания", color: "Розовое", taste: "Лакрица и слива", tasteEmoji: "🍑" },
        { name: "Массандра (Красный)", sugar: "Сладкое", grape: "Саперави, Каберне Совиньон", country: "Россия", color: "Красное", taste: "Клубника, черная смотродина, вишня, корица", tasteEmoji: "🍓" },
        { name: "Массандра (Белый)", sugar: "Сладкое", grape: "Ркацетели, Шардоне, Мускат", country: "Россия", color: "Белое", taste: "Персик, груша, яблоко", tasteEmoji: "🍑" },
        { name: "Массандра (Розовый)", sugar: "Сладкое", grape: "Ркацетели, конкур, каберне совиньон", country: "Россия", color: "Розовое", taste: "Клубника, малина, вишня", tasteEmoji: "🍓" },
        { name: "Кампело адамаде Виньо Верде", sugar: "Полусухое", grape: "Трейшадура", country: "Португалия", color: "Белое", taste: "Яблоко и лимон", tasteEmoji: "🍎" }
    ];

    if (wineCatalog.length !== 28) console.warn("Карточек:", wineCatalog.length);
    let currentIndex = 0;
    let currentFlipState = false;

    const flashcardEl = document.getElementById('flashcard');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const currentIdxDisplay = document.getElementById('currentIdxDisplay');
    const wineNameIndicator = document.getElementById('wineNameIndicator');
    const shuffleBtn = document.getElementById('shuffleBtn');
    const resetFlipBtn = document.getElementById('resetFlipBtn');

    function getWineIcon(colorType) {
        const type = colorType.toLowerCase();
        if (type.includes('белое') && !type.includes('красное') && !type.includes('розовое')) return '🥂🍾';
        if (type.includes('розовое')) return '🌸🍷';
        if (type.includes('безалкогольное')) return '🍇🚫';
        if (type.includes('креплёное')) return '🍷✨';
        return '🍷';
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Создаем обратную сторону с отдельной строкой "Ассоциация вкуса / аромат" + уникальный смайлик
    function createBackSideHTML(wine) {
        let colorCircleBg = '#8b2c1d';
        if (wine.color.includes('Белое') && !wine.color.includes('Красное') && !wine.color.includes('Розовое')) colorCircleBg = '#f9e7b3';
        else if (wine.color.includes('Розовое')) colorCircleBg = '#e7b2b0';
        else if (wine.color.includes('безалкогольное')) colorCircleBg = '#ab8e5c';
        else if (wine.color.includes('креплёное')) colorCircleBg = '#9c3e2c';
        else colorCircleBg = '#a33f28';

        return `
            <div class="info-block">
                <div class="info-label">🍇 СОРТ ВИНОГРАДА</div>
                <div class="info-value">${escapeHtml(wine.grape)}</div>
            </div>
            <div class="info-block">
                <div class="info-label">🌸 АССОЦИАЦИЯ ВКУСА / АРОМАТ</div>
                <div class="info-value taste-association">${wine.tasteEmoji} ${escapeHtml(wine.taste)}</div>
            </div>
            <div class="info-block">
                <div class="info-label">🍬 СОДЕРЖАНИЕ САХАРА</div>
                <div class="info-value">${escapeHtml(wine.sugar)}</div>
            </div>
            <div class="info-block">
                <div class="info-label">🌍 СТРАНА</div>
                <div class="info-value">${escapeHtml(wine.country)}</div>
            </div>
            <div class="info-block">
                <div class="info-label">🎨 ЦВЕТ / ТИП</div>
                <div class="info-value">
                    <div class="color-row">
                        <span class="color-tag" style="background-color: ${colorCircleBg};"></span>
                        <span>${escapeHtml(wine.color)}</span>
                    </div>
                </div>
            </div>
            <div class="footer-card">🍷 Вино - это искусство ✨</div>
        `;
    }

    function renderCurrentCard() {
        const wine = wineCatalog[currentIndex];
        if (!wine) return;
        
        const icon = getWineIcon(wine.color);
        const frontHTML = `
            <div class="card-front">
                <div class="wine-icon">${icon}</div>
                <h2>${escapeHtml(wine.name)}</h2>
                <div class="flip-hint">👆 нажми, чтобы узнать информацию</div>
            </div>
            <div class="card-back">
                ${createBackSideHTML(wine)}
            </div>
        `;
        
        const innerDiv = flashcardEl.querySelector('.card-inner');
        if (innerDiv) {
            innerDiv.innerHTML = frontHTML;
        } else {
            flashcardEl.innerHTML = `<div class="card-inner">${frontHTML}</div>`;
        }
        
        if (currentFlipState) {
            flashcardEl.classList.add('flipped');
        } else {
            flashcardEl.classList.remove('flipped');
        }
        
        // Обновляем счётчик и название вина (счётчик всегда на одном месте, т.к. имеет фиксированную ширину)
        currentIdxDisplay.innerText = `${currentIndex+1} / ${wineCatalog.length}`;
        // Ограничиваем длину названия, чтобы индикатор не прыгал
        let shortName = wine.name;
        if (shortName.length > 32) shortName = shortName.substring(0, 30) + '…';
        wineNameIndicator.innerText = shortName;
    }
    
    function goToIndex(newIndex) {
        if (newIndex < 0) newIndex = wineCatalog.length - 1;
        if (newIndex >= wineCatalog.length) newIndex = 0;
        currentIndex = newIndex;
        currentFlipState = false;
        renderCurrentCard();
    }
    
    function nextCard() { goToIndex(currentIndex + 1); }
    function prevCard() { goToIndex(currentIndex - 1); }
    
    function toggleFlip(e) {
        e.stopPropagation();
        currentFlipState = !currentFlipState;
        if (currentFlipState) flashcardEl.classList.add('flipped');
        else flashcardEl.classList.remove('flipped');
    }
    
    function shuffleWines() {
        for (let i = wineCatalog.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [wineCatalog[i], wineCatalog[j]] = [wineCatalog[j], wineCatalog[i]];
        }
        currentIndex = 0;
        currentFlipState = false;
        renderCurrentCard();
    }
    
    function resetFlipOnly() {
        if (currentFlipState) {
            currentFlipState = false;
            flashcardEl.classList.remove('flipped');
        } else {
            // легкий фидбек если карточка уже лицом
            flashcardEl.style.transform = 'scale(0.99)';
            setTimeout(() => { if(flashcardEl) flashcardEl.style.transform = ''; }, 120);

    // поддержка свайпов
    let touchStartX = 0;
    function handleTouchStart(e) { touchStartX = e.changedTouches[0].screenX; }
    function handleTouchEnd(e) {
        const delta = e.changedTouches[0].screenX - touchStartX;
        if (Math.abs(delta) > 55) delta > 0 ? prevCard() : nextCard();
    }
    
    function bindEvents() {
        prevBtn.onclick = (e) => { e.preventDefault(); prevCard(); };
        nextBtn.onclick = (e) => { e.preventDefault(); nextCard(); };
        flashcardEl.onclick = toggleFlip;
        shuffleBtn.onclick = () => shuffleWines();
        resetFlipBtn.onclick = () => resetFlipOnly();
        
        const container = document.querySelector('.carousel-container');
        if (container) {
            container.addEventListener('touchstart', handleTouchStart, { passive: true });
            container.addEventListener('touchend', handleTouchEnd);
        }
        flashcardEl.addEventListener('touchstart', handleTouchStart, { passive: true });
        flashcardEl.addEventListener('touchend', handleTouchEnd);
    }
    
    function init() {
        if (!flashcardEl.querySelector('.card-inner')) {
            flashcardEl.innerHTML = '<div class="card-inner"></div>';
        }
        renderCurrentCard();
        bindEvents();
    }
    
    init();
